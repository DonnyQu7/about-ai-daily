name: Daily AI Application Report

on:
  workflow_dispatch:
  schedule:
    # 03:00 UTC = 07:00 UAE time (UTC+4)
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate report
        run: python3 scripts/run_daily.py --config config/sources.example.json

      - name: Resolve report paths
        id: report
        env:
          REPORT_BASE_URL: ${{ vars.REPORT_BASE_URL }}
        run: |
          REPORT_DATE="$(date -u +%F)"
          REPORT_HTML="reports/${REPORT_DATE}.html"
          REPORT_POSTER="reports/${REPORT_DATE}-poster.svg"
          DEFAULT_LINK="https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/${REPORT_HTML}"
          if [ -n "$REPORT_BASE_URL" ]; then
            REPORT_LINK="${REPORT_BASE_URL%/}/${REPORT_HTML}"
          else
            REPORT_LINK="$DEFAULT_LINK"
          fi
          echo "date=${REPORT_DATE}" >> "$GITHUB_OUTPUT"
          echo "html=${REPORT_HTML}" >> "$GITHUB_OUTPUT"
          echo "poster=${REPORT_POSTER}" >> "$GITHUB_OUTPUT"
          echo "link=${REPORT_LINK}" >> "$GITHUB_OUTPUT"

      - name: Commit generated report
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports data/items
          git diff --cached --quiet || git commit -m "chore: update daily AI report"
          git push

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-testing-report-${{ steps.report.outputs.date }}
          path: |
            ${{ steps.report.outputs.html }}
            ${{ steps.report.outputs.poster }}
            data/items/${{ steps.report.outputs.date }}.json

      - name: Send email
        if: always()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          python3 scripts/send_report_email.py \
            --to "qudongisme@gmail.com" \
            --subject "软件测试与自动化执行流 GitHub 热点日报 ${{ steps.report.outputs.date }}" \
            --html-report "${{ steps.report.outputs.html }}" \
            --poster "${{ steps.report.outputs.poster }}" \
            --link "${{ steps.report.outputs.link }}"
